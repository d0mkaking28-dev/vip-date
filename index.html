<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Invitation</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

.container{
max-width:700px;
padding:30px;
}

.hidden{
opacity:0;
transform:translateY(20px);
animation:fade 1.5s forwards;
}

.one{animation-delay:1s;}
.two{animation-delay:3s;}
.three{animation-delay:5s;}
.four{animation-delay:7s;}
.five{animation-delay:9s;}

button{
margin-top:25px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:12px;
background:#d4af37;
color:#000;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

@keyframes fade{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="container">

<h2 class="hidden one">✨ Для тебя есть кое-что особенное...</h2>

<h1 class="hidden two">💌 Приглашение на свидание</h1>

<p class="hidden three">
Я хочу пригласить тебя провести этот вечер вместе.
</p>

<p class="hidden four">
📅 Дата: 22 июля<br>
🕕 Время: 13:00<br>
📍 Место: Acropolis, Vilnius
</p>

<div class="hidden five">
<button onclick="acceptInvitation()">
❤️ Принять приглашение
</button>
</div>

</div>

<script>
function acceptInvitation() {
  document.querySelector(".container").innerHTML = `
    <h1 style="color:#d4af37;font-size:42px;">❤️ Спасибо!</h1>

    <p style="font-size:22px;margin-top:25px;">
      Я очень рад, что ты приняла приглашение.
    </p>

    <p style="font-size:18px;margin-top:15px;">
      До встречи! 🌹
    </p>
  `;
}
</script>

</body>
</html>
